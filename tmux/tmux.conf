# ========================================
# General
# ========================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 0
set -g allow-passthrough on
set -g history-limit 50000
set -g mouse on
set -s set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -g focus-events on

# ========================================
# Pass through special keys (needed for Shift+Enter in Claude Code)
# ========================================
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ========================================
# Prefix
# ========================================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ========================================
# Key Bindings
# ========================================
# Splits: | for horizontal, - for vertical (in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane resizing (repeatable, 1 second window to keep pressing)
set -g repeat-time 1000
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# Workstream: prefix + W to create, prefix + f to fuzzy-pick
bind W command-prompt -p "workstream name:" "run-shell 'tw %1'"
bind f display-popup -E -w 80% -h 60% "tw-picker"

# ========================================
# Copy Mode (vi-style with system clipboard)
# ========================================
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ========================================
# vim-tmux-navigator
# ========================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# ========================================
# Activity & Bell Monitoring
# ========================================
setw -g monitor-activity on
set -g visual-activity off
setw -g monitor-bell on
set -g visual-bell off

# ========================================
# Status Bar (OneDark theme)
# ========================================
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#282c34,fg=#abb2bf"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#282c34,bg=#98c379,bold] #S #[fg=#98c379,bg=#282c34] "

# Center: window list
setw -g window-status-format "#[fg=#5c6370] #I:#W "
setw -g window-status-current-format "#[fg=#282c34,bg=#61afef,bold] #I:#W #[fg=#61afef,bg=#282c34]"
setw -g window-status-activity-style "fg=#e5c07b"
setw -g window-status-bell-style "fg=#e06c75,bold"

# Right: time
set -g status-right-length 40
set -g status-right "#[fg=#5c6370] %H:%M  %b %d "

# Pane borders
set -g pane-border-style "fg=#3e4452"
set -g pane-active-border-style "fg=#61afef"

# Message style
set -g message-style "bg=#282c34,fg=#61afef"
