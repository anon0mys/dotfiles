- defaults:
    link:
      relink: true
      create: true

- clean: ['~']

- link:
    ~/.gitconfig: git/gitconfig
    ~/.gitidentities: git/gitidentities
    ~/.gitignore: git/gitignore
    ~/.ssh/config: ssh/config
    ~/bin: bin        
    ~/.zshrc: zshrc
    ~/.vimrc: vimrc
    ~/.config/ghostty/config: ghostty/config
    ~/.config/nvim: nvim
    ~/.tmux.conf: tmux/tmux.conf
    ~/.claude: claude

- shell:
  - git submodule sync --recursive
  - git submodule update --init --recursive
  - git config --global core.excludesfile ~/.gitignore
  - command: ./scripts/setup-zsh.sh
    description: Installing zsh plugins
    stdin: true
    stdout: true
    stderr: true
  - command: vim +PlugUpdate +PlugUpgrade +qall
    description: Installing vim plugins
    stdin: true
    stdout: true
    stderr: true
  - command: nvim --headless "+Lazy! sync" +qa
    description: Installing Neovim plugins via lazy.nvim
    stdin: true
    stdout: true
    stderr: true
  - command: ./scripts/setup-brew.sh
    description: Installing Homebrew
    stdin: true
    stdout: true
    stderr: true
  - command: brew bundle
    description: Installing Homebrew formulas from Brewfile
    stderr: true
    stdout: true
